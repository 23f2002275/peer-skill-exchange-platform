<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peer Skill Exchange</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <router-link class="navbar-brand fw-bold" to="/">Skill Exchange</router-link>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mainNav">
                    <div class="navbar-nav me-auto">
                        <router-link class="nav-link" to="/discover">Discover</router-link>
                        <router-link class="nav-link" to="/dashboard" v-if="isLoggedIn">Dashboard</router-link>
                        <router-link class="nav-link" to="/requests" v-if="role === 'member'">Requests</router-link>
                        <router-link class="nav-link" to="/sessions" v-if="role === 'member'">Sessions</router-link>
                        <router-link class="nav-link" to="/my-offerings" v-if="role === 'member'">My Offerings</router-link>
                        <router-link class="nav-link" to="/wallet" v-if="role === 'member'">Wallet</router-link>
                        <router-link class="nav-link" to="/admin" v-if="role === 'admin'">Admin</router-link>
                    </div>
                    <div class="navbar-nav align-items-lg-center">
                        <span class="navbar-text me-3" v-if="user">{{ user.name }} · {{ user.credit_balance }} credits</span>
                        <router-link class="nav-link" to="/profile" v-if="role === 'member'">Profile</router-link>
                        <router-link class="nav-link" to="/login" v-if="!isLoggedIn">Login</router-link>
                        <router-link class="nav-link" to="/register" v-if="!isLoggedIn">Register</router-link>
                        <button class="btn btn-light btn-sm" @click="logout" v-if="isLoggedIn">Logout</button>
                    </div>
                </div>
            </div>
        </nav>
        <main><router-view></router-view></main>
        <footer class="py-4 border-top mt-5"><div class="container text-center text-muted">Peer Skill Exchange Platform</div></footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-router@3.6.5/dist/vue-router.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/components/Home.js"></script>
    <script src="js/components/Login.js"></script>
    <script src="js/components/Register.js"></script>
    <script src="js/components/Discover.js"></script>
    <script src="js/components/OfferingDetails.js"></script>
    <script src="js/components/ManageOffering.js"></script>
    <script src="js/components/MyOfferings.js"></script>
    <script src="js/components/Dashboard.js"></script>
    <script src="js/components/Requests.js"></script>
    <script src="js/components/Sessions.js"></script>
    <script src="js/components/Wallet.js"></script>
    <script src="js/components/Profile.js"></script>
    <script src="js/components/AdminDashboard.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
